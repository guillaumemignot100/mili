name: milibris_ffi
description: 'A new Flutter FFI plugin project.'
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  jni: ^0.15.2
  objective_c: ^9.1.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  build_runner: ^2.11.1
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  jnigen: ^0.15.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
